name: Quality Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'feat/**'

jobs:
  check:
    name: Build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dalsland-web

    steps:
      # Check out the repository code
      - uses: actions/checkout@v4

      # Set up Node 20 and cache npm dependencies for faster runs
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dalsland-web/package-lock.json

      # Install exact versions from package-lock.json
      - run: npm ci

      # Build the app — catches type errors and broken imports
      - run: npm run build
